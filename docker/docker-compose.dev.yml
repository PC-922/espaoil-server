version: '3.8'

networks:
  default:
    name: espaoil_network

services:
  espaoil-server:
    container_name: espaoil-server
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.dev
    env_file:
      - ../.env
    environment:
      - PORT=8080
      - DATABASE_URL=mongodb://user:password@db:27017/?authSource=admin
      - GRADLE_USER_HOME=/home/gradle
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      db:
        condition: service_healthy
    # Live reload: mount source files + gradle cache
    volumes:
      - ../app/src/main/kotlin:/app/app/src/main/kotlin
      - ../app/src/test/kotlin:/app/app/src/test/kotlin
      - gradle-cache:/home/gradle/.gradle
    working_dir: /app

  db:
    image: mongo:6.0.2
    ports:
      - "27017:27017"
    container_name: espaoil-db
    healthcheck:
      test: echo 'db.runCommand({serverStatus:1}).ok' | mongosh admin -u user -p password --quiet | grep 1
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_USERNAME: user
      MONGO_PASSWORD: password
      MONGO_INITDB_DATABASE: espaoil

volumes:
  gradle-cache:
